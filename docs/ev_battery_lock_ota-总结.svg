      <div class="container">

<h1>8家车企被约谈是假，但锁电这件事真该聊聊</h1>
<div class="meta">
  <span class="tag tag-blue">播客</span>
  <span class="tag tag-purple">新能源车</span>
  <span class="tag tag-orange">47分钟</span>
  <span class="tag tag-green">百车全说</span>
</div>
<div class="summary-line">三刀拆解「8家车企因锁电被约谈」假新闻始末，深入讲清 OTA 锁电机制、BMS 快乐表、八年质保倒逼与车主权力边界，并给出留证维权与集体投诉的实操路径。</div>

<div class="timeline">
  <h3>关键时间轴</h3>
  <div class="timeline-item"><span class="timeline-time">00:29</span><span class="timeline-text">假新闻引爆：网传2026年3月锁电投诉暴增273%，8家车企被约谈</span></div>
  <div class="timeline-item"><span class="timeline-time">02:12</span><span class="timeline-text">辟谣大戏：中汽协副秘书长柳燕澄清，央视网跟进更正</span></div>
  <div class="timeline-item"><span class="timeline-time">08:45</span><span class="timeline-text">「快乐表」揭秘：仪表显示100%满电，实际电池容量已被压缩</span></div>
  <div class="timeline-item"><span class="timeline-time">13:32</span><span class="timeline-text">锁电案例：OTA后续航少50公里，快充功率从120kW降至80kW</span></div>
  <div class="timeline-item"><span class="timeline-time">18:46</span><span class="timeline-text">问题本质：不是续航长短，而是车企与车主间的权力边界</span></div>
  <div class="timeline-item"><span class="timeline-time">23:58</span><span class="timeline-text">OTA黑盒：BMS参数不透明，车主维权如「小鸡对大象」</span></div>
  <div class="timeline-item"><span class="timeline-time">28:00</span><span class="timeline-text">维权困境：花25000元第三方检测，法庭可能不予采信</span></div>
  <div class="timeline-item"><span class="timeline-time">29:10</span><span class="timeline-text">策略升级：500人集体投诉，维权力量倍增</span></div>
  <div class="timeline-item"><span class="timeline-time">37:30</span><span class="timeline-text">行业涟漪：特斯拉选择欣旺达作电池供应商，供应链变动</span></div>
</div>

<div class="map">
  <h2>核心脉络</h2>
  <div class="diagram">
    <div class="node">假新闻<br/><small>8家车企约谈</small></div>
    <div class="arrow">→</div>
    <div class="node node-orange">锁电真问题<br/><small>OTA改BMS参数</small></div>
    <div class="arrow">→</div>
    <div class="node">权力边界<br/><small>知情权+选择权</small></div>
    <div class="arrow">→</div>
    <div class="node node-green">监管备案<br/><small>工信部OTA制度</small></div>
    <div class="arrow">→</div>
    <div class="node node-orange">维权路径<br/><small>留证+集体投诉</small></div>
  </div>
</div>

<div class="correction">
  <h3>⚠ 常见误解 / 认知纠偏</h3>
  <p><b>误解1：</b>「8家车企被约谈锁电」是真的 → <b>真相：</b>中汽协副秘书长柳燕、央视网均已辟谣，网传名单（比亚迪/特斯拉/小鹏等）系AI造假图片，与事实严重不符。</p>
  <p><b>误解2：</b>锁电就是电池自然衰减 → <b>真相：</b>锁电是车企通过OTA主动修改BMS参数，限制充放电深度和功率，仪表仍显示100%满电（「快乐表」），与自然衰减有本质区别。</p>
  <p><b>误解3：</b>锁电完全违法 → <b>真相：</b>若经正规召回程序、充分告知、监管部门备案审批，出于安全隐患的OTA调整逻辑成立；问题在于<b>偷偷强制、模糊告知</b>。</p>
</div>

<div class="section">
  <h2 class="sec-title">Part 1：锁电风波与权力边界</h2>

  <div class="card">
    <h3>什么是「锁电」</h3>
    <p><b>核心机制：</b>车企通过OTA远程升级或4S店OBD接口，修改电池管理系统（BMS）参数，限制充电上限、放电深度、快充功率和电机输出，让电池进入更保守的运行状态。</p>
    <p><b>关键理解：</b>BMS是电池包的「大脑」，决定能充到什么程度、放到什么程度、何时限制功率。厂家卖车时承诺100升水桶，几年后仪表仍显示100%满电，实际可能只能装90升，这就是「快乐表」。</p>
    <p><b>典型场景：</b>2018年前后购买的新能源车即将满8年质保，车企为避免大规模索赔和负面舆情，可能通过OTA收紧电池策略。</p>
    <div class="relation">相关概念：锁电 vs 自然衰减 vs 硬件阉割（如smart精灵加热功能付费解锁）</div>
    <div class="highlight">原文依据：「厂家一开始告诉你水桶能装100升，开了几年仪表盘显示100%满电，实际装的其实不是100升，仪表就是快乐表。」</div>
  </div>

  <div class="card card-purple">
    <h3><span class="speaker speaker-guest">主播观点</span>车企为何「热衷」锁电</h3>
    <p>2026年恰逢2018年新能源车爆发满8年，八年12万公里电池质保到期。大规模电池衰减故障意味着真金白银的索赔成本和品牌负资产，倒逼车企通过软件策略让电池更保守、更「偷懒」。</p>
    <p>充电上限压一压、放电深度收一收、功率控一控，电池寿命更长、健康度更好看，但用户代价是续航变短、动力变弱、充电变慢。</p>
    <div class="quote">「让电池减缓衰减初衷是好的，但动机到底是为你车主好，还是为了过质保后不再索赔？这个问题有的时候你没办法去解释。」</div>
    <p><b>适用边界：</b>若提前充分告知、用户可选择接受或拒绝，并签署电子确认，逻辑可成立；默默OTA、用「优化性能」包装则越界。</p>
  </div>

  <div class="card card-orange">
    <h3>⚠ 车主三大痛点</h3>
    <p><b>原因：</b>燃油车时代发动机功率、变速箱档位、油箱大小都是谈好的；电车时代电池能不能充满、快充功率能不能到顶、动力能不能放开，很多时候不是车主说了算。</p>
    <div class="pitfall">三刀归纳：第一不尊重我，第二没有知情权，第三没有选择，甚至有欺骗成分。OTA说明里写「优化了什么」，但安装包不小，你不知道是真优化还是从你腰包偷走权益。</div>
    <p><b>解法：</b>要求OTA前提供风险告知书，明确列出续航/功率/充电变化，强制「接受/拒绝」二选一，不可忽略。</p>
    <p><b>严重程度：</b>致命（涉及数万至数十万资产贬值，非手机几千块可比）</p>
  </div>

  <div class="card">
    <h3>电车 vs 手机：为何锁电更恶劣</h3>
    <table>
      <tr><th>维度</th><th>手机OTA变卡</th><th>电车OTA锁电</th><th>一句话结论</th></tr>
      <tr><td>资产价值</td><td>几千元，用两三年更不值钱</td><td>十几万至几十万，二手车残值受影响</td><td>车是重大资产，参数被改无法轻易更换</td></tr>
      <tr><td>可替代性</td><td>不用可换，损失有限</td><td>不可能说换就换，只能换更好的</td><td>车主被绑定在贬值资产上</td></tr>
      <tr><td>感知方式</td><td>卡顿可直观感受</td><td>BMS黑盒，只能猜测续航/动力变化</td><td>举证难度极高</td></tr>
      <tr><td>维权成本</td><td>通常放弃</td><td>第三方检测2.5万，法庭可能不认</td><td>个人几乎无法独立维权成功</td></tr>
    </table>
  </div>
</div>

<div class="section">
  <h2 class="sec-title">Part 2：监管框架与维权路径</h2>

  <div class="card">
    <h3>工信部OTA备案制度</h3>
    <p><b>核心机制：</b>2021年工信部要求车企OTA具备安全影响评估、测试验证、实施保障和信息记录，须告知升级目的、内容、时长、注意事项和结果。2025年进一步收紧，涉及主要技术参数变更须取得产品变更许可并完成备案。</p>
    <p><b>关键理解：</b>去年多家车企OTA推送延期，正是因为备案审批打乱了时间表。既然已有备案制度，出现大量抱怨后再约谈车企，逻辑上应审视备案审核是否严谨。</p>
    <div class="highlight">原文依据：「厂家不能用软件来掩盖硬件问题，相关主管部门在审核备案过程中也要严谨，查出逃避召回责任就不能让它推送。」</div>
    <p><b>适用边界：</b>公开合规的安全召回OTA可以；偷偷强制、模糊告知、包装成「优化」则侵犯消费者权益。</p>
  </div>

  <div class="card card-orange">
    <h3>⚠ 维权为何「难」字当头</h3>
    <p><b>原因：</b>OTA是黑盒，BMS参数升级前后车主永远拿不到；只能感受续航变短、加速不给力，但无法证明是锁电而非温度、高速、雨天、山路、快充习惯或自然衰减。</p>
    <div class="pitfall">个人面对企业，信息极其不对称。花25000元第三方检测电池容量和健康度，若非法院指定机构，报告可能不被采信；指定后再花25000，官司还不一定赢。</div>
    <p><b>解法：</b>司法渠道成本最高、效果未必最好；社交媒体讨论帖+12315/市场监管局/工信部集体投诉，相对更有效。</p>
    <p><b>严重程度：</b>致命（三刀直言：「怎么维权？一个字难，两个字很难，其实我想讲的是根本就维不了。」）</p>
  </div>

  <div class="card card-purple">
    <h3><span class="speaker speaker-guest">主播观点</span>集体维权是唯一可行路径</h3>
    <p>车企不是怕你一个人生气，是怕你们一起生气。一个人是偶发故障，10人可能是批次问题，100人、500人就是群体维权事件，监管部门处理方式完全不同。</p>
    <div class="quote">「你同样内情的车、同样年份买的，现在续航是多少？找到OTA后明显感觉续航上不去的车主，一起打12315、市场监管局、工信部投诉。500人规模使维权力量倍增。」</div>
    <div class="action">怎么落地：在社交媒体发讨论帖（不直接控诉，而是询问同款车型同批次车主续航表现），评论区互动后集体向12315、市场监管部门、工信部车质网投诉。</div>
  </div>

  <div class="card card-green">
    <h3>💡 心法：从OTA升级第一天开始留证</h3>
    <p><b>为什么重要：</b>没有证据链，法庭日记本也不一定能打赢官司，但留证是唯一能做的准备。</p>
    <div class="action">怎么落地：感觉续航轻微下滑时开始记录——OTA前后软件版本、升级时间、满电表显续航、实际达成率、充电桩记录（充了多少度电、充电功率曲线）、天气温度、驾驶路线。养成「日记」习惯。</div>
    <p><b>适用边界：</b>留证不能替代监管介入，但为集体维权提供时间线佐证；底层BMS参数仍需监管部门追溯OTA备案记录。</p>
  </div>
</div>

<div class="section">
  <h2 class="sec-title">Part 3：行业涟漪（供应链变动）</h2>

  <div class="card">
    <h3>特斯拉选择欣旺达：供应商策略解读</h3>
    <p><b>核心机制：</b>电池行业供应商少，达不到「2223」组合（2高端+2中端+3低端），但特斯拉纳入五家电池供应商已是车企中非常多的配置。</p>
    <p><b>关键理解：</b>听友五爪草莓鱼指出：健康供应商库应让高端车型用4家竞争保质量，中低端用中端+低端竞争。特斯拉按此逻辑纳入欣旺达，与宁德时代存在供应链变动。</p>
    <div class="relation">相关概念：欣旺达被特斯拉选中 vs 被解读为「二线品牌」 vs iPhone也在用欣旺达</div>
    <div class="highlight">原文依据：「国产电车用欣旺达大家会质疑，特斯拉用欣旺达会被解读成质量还行——无非消费者不懂电池、带有色眼镜。」</div>
  </div>
</div>

<div class="conclusion">
  <h2>总结与行动</h2>
  <h3>核心要点</h3>
  <ul>
    <li>「8家车企锁电约谈」是假新闻，但新能源车OTA锁电现象真实存在且难以证明</li>
    <li>锁电本质是车企通过BMS参数修改限制电池性能，仪表「快乐表」掩盖实际容量缩水</li>
    <li>八年质保到期是车企锁电的重要动机：减少索赔、控制品牌风险</li>
    <li>问题核心不是续航少几十公里，而是知情权、选择权和权力边界</li>
    <li>工信部OTA备案制度已建立，但执行透明度和审核严谨性是关键</li>
  </ul>
  <h3>行动清单</h3>
  <ol>
    <li>每次OTA前仔细阅读升级说明，对比升级前后续航、充电速度、动力表现并截图存档</li>
    <li>感觉性能异常时，在社交媒体发起同款车型续航讨论帖，寻找同批次受影响车主</li>
    <li>积累10人以上后，集体向12315、市场监管局、工信部车质网投诉</li>
    <li>要求车企提供OTA风险告知和接受/拒绝选项，推动行业透明化</li>
    <li>关注工信部OTA备案公示，了解自家车型升级是否经过合规审批</li>
  </ol>
  <h3>关键认知转变</h3>
  <p>以前认为「锁电是假新闻、跟我无关」→ 现在理解了软件定义汽车时代，车企与车主的权力边界才是核心：卖车时讲性能、OTA时讲优化、索赔时讲自然衰减，这套逻辑消费者承受不了，必须从监管源头和集体行动两个方向破局。</p>

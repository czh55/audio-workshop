<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 SVG 总结墙</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b1120;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #60a5fa;
      --accent2: #a78bfa;
      --accent3: #f472b6;
      --tag-blue: rgba(96,165,250,0.15);
      --tag-purple: rgba(167,139,250,0.15);
      --tag-green: rgba(52,211,153,0.15);
      --tag-orange: rgba(251,146,60,0.15);
      --card-hover: rgba(255,255,255,0.08);
    }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.6;
    }

    /* ====== 顶部区域 ====== */
    .hero {
      position: relative;
      padding: 64px 24px 48px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero h1 {
      font-size: 44px;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 40%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      position: relative;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    /* ====== 统计栏 ====== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 0 24px 32px;
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
    }
    .stat-num {
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ====== 日历导航 ====== */
    .calendar-wrapper {
      max-width: 360px;
      margin: 0 auto 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(12px);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .cal-nav-btn:hover {
      background: var(--card-hover);
      color: var(--text);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }
    .cal-day-header {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0;
      font-weight: 600;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border-radius: 8px;
      cursor: default;
      color: var(--text-secondary);
      transition: all 0.15s;
      position: relative;
    }
    .cal-day.has-data {
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      background: rgba(96,165,250,0.12);
    }
    .cal-day.has-data:hover {
      background: rgba(96,165,250,0.25);
      transform: scale(1.1);
    }
    .cal-day.today {
      border: 2px solid var(--accent);
    }
    .cal-day.other-month {
      color: var(--text-muted);
      opacity: 0.3;
    }
    .cal-today-btn {
      display: block;
      margin: 12px auto 0;
      padding: 6px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cal-today-btn:hover {
      background: var(--card-hover);
      color: var(--text);
    }

    /* ====== 主内容区 ====== */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ====== 时间线 ====== */
    .timeline {
      position: relative;
      padding-left: 40px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 8px;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(96,165,250,0.4), rgba(167,139,250,0.2), transparent);
    }
    .date-group {
      margin-bottom: 40px;
      position: relative;
    }
    .date-dot {
      position: absolute;
      left: -28px;
      top: 10px;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(96,165,250,0.15);
    }
    .date-label {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .date-label .weekday {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface);
    }
    .date-label .count-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(96,165,250,0.12);
      padding: 2px 10px;
      border-radius: 10px;
    }

    /* ====== 卡片 ====== */
    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: 0 3px 3px 0;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.15);
      transform: translateX(4px);
    }
    .card:hover::before {
      opacity: 1;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .card-time {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-top: 2px;
    }
    .card-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .card-tag {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 6px;
      font-weight: 600;
    }
    .tag-blue   { background: var(--tag-blue);   color: #60a5fa; }
    .tag-purple { background: var(--tag-purple); color: #a78bfa; }
    .tag-green  { background: var(--tag-green);  color: #34d399; }
    .tag-orange { background: var(--tag-orange); color: #fb923c; }
    .card-link-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--text-muted);
      opacity: 0;
      transition: all 0.2s;
    }
    .card:hover .card-link-icon {
      opacity: 1;
      right: 16px;
    }
    .card-error {
      opacity: 0.5;
      border-left: 3px solid #ef4444;
    }
    .card-error:hover {
      opacity: 0.7;
      transform: none;
    }
    .card-error .card-title {
      color: #f87171;
    }
    .card-source-link {
      display: inline-block;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .card-source-link:hover {
      color: var(--accent);
    }

    /* ====== 搜索 ====== */
    .search-bar {
      max-width: 860px;
      margin: 0 auto 32px;
      padding: 0 24px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: rgba(96,165,250,0.4);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
    }
    .search-icon {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ====== 空状态 ====== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .empty-state h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .empty-hint {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 24px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ====== 响应式 ====== */
    @media (max-width: 640px) {
      .hero h1 { font-size: 30px; }
      .hero { padding: 40px 16px 32px; }
      .stats-bar { gap: 24px; }
      .stat-num { font-size: 28px; }
      .timeline { padding-left: 32px; }
      .timeline::before { left: 12px; }
      .date-dot { left: -22px; width: 10px; height: 10px; }
      .date-label { font-size: 18px; }
      .card { padding: 18px; }
      .card-title { font-size: 16px; }
      .search-bar { padding: 0 12px; }
      .search-input { padding: 12px 16px 12px 40px; }
      .search-icon { left: 28px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>博客 SVG 总结墙</h1>
    <p>提交网址 → 自动抓取 · 分析 · 生成 SVG 总结</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">总总结</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="totalDays">0</div>
      <div class="stat-label">覆盖天数</div>
    </div>
  </div>

  <!-- 日历 -->
  <div class="calendar-wrapper" id="calendarWrapper">
    <div class="cal-header">
      <button class="cal-nav-btn" id="calPrev">&larr;</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="cal-nav-btn" id="calNext">&rarr;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-day-header">日</div>
      <div class="cal-day-header">一</div>
      <div class="cal-day-header">二</div>
      <div class="cal-day-header">三</div>
      <div class="cal-day-header">四</div>
      <div class="cal-day-header">五</div>
      <div class="cal-day-header">六</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <button class="cal-today-btn" id="calToday">回到今天</button>
  </div>

  <!-- 搜索 -->
  <div class="search-bar" id="searchBar">
    <span class="search-icon">&#x1F50D;</span>
    <input class="search-input" id="searchInput" type="text" placeholder="按标题或摘要搜索...">
  </div>

  <!-- 主内容 -->
  <div class="container" id="mainContainer">
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">&#x1F4ED;</span>
      <h2>还没有博客总结</h2>
      <p>提交你的第一篇博客文章，自动生成深度 SVG 总结</p>
      <div class="empty-hint">curl -X POST &lt;webhook-url&gt; -d '{"url":"..."}'</div>
    </div>
    <div class="timeline" id="timeline" style="display:none;"></div>
    <div class="search-empty" id="searchEmpty" style="display:none;">没有找到匹配的总结</div>
  </div>

  <script>
    (function() {
      let allData = [];
      let dateMap = {};
      let calYear, calMonth;

      const $ = id => document.getElementById(id);

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      const TAG_COLORS = ['tag-blue','tag-purple','tag-green','tag-orange'];

      async function loadData() {
        try {
          const resp = await fetch('index.json');
          if (!resp.ok) throw new Error('Failed');
          allData = await resp.json();
        } catch (e) {
          allData = [];
        }
        buildDateMap();
        render();
      }

      function buildDateMap() {
        dateMap = {};
        allData.forEach(item => {
          const d = item.date || '';
          if (!dateMap[d]) dateMap[d] = [];
          dateMap[d].push(item);
        });
      }

      function render() {
        const hasData = allData.length > 0;

        $('searchBar').style.display = hasData ? 'block' : 'none';
        $('calendarWrapper').style.display = hasData ? 'block' : 'none';

        if (!hasData) {
          $('emptyState').style.display = '';
          $('timeline').style.display = 'none';
          $('searchEmpty').style.display = 'none';
          updateStats(0, 0);
          return;
        }

        $('emptyState').style.display = 'none';

        const days = Object.keys(dateMap).sort().reverse();
        updateStats(allData.length, days.length);

        const query = $('searchInput').value.trim().toLowerCase();
        let filteredDays = days;
        let visibleCount = 0;

        if (query) {
          filteredDays = days.filter(d => {
            const items = dateMap[d].filter(item =>
              (item.title || '').toLowerCase().includes(query) ||
              (item.summary || '').toLowerCase().includes(query) ||
              (item.url || '').toLowerCase().includes(query) ||
              (item.error_message || '').toLowerCase().includes(query)
            );
            dateMap[d]._filtered = items;
            if (items.length > 0) visibleCount++;
            return items.length > 0;
          });
        } else {
          days.forEach(d => { dateMap[d]._filtered = dateMap[d]; });
        }

        if (query && visibleCount === 0) {
          $('timeline').style.display = 'none';
          $('searchEmpty').style.display = '';
        } else {
          $('timeline').style.display = '';
          $('searchEmpty').style.display = 'none';
          buildTimeline(filteredDays);
        }

        buildCalendar();
      }

      function buildTimeline(days) {
        const tl = $('timeline');
        tl.innerHTML = '';

        if (days.length === 0) return;

        const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

        days.forEach(dateStr => {
          const items = dateMap[dateStr]._filtered || dateMap[dateStr];
          if (items.length === 0) return;

          const d = new Date(dateStr + 'T00:00:00');
          const display = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
          const wd = WEEKDAYS[d.getDay()];

          const group = document.createElement('div');
          group.className = 'date-group';

          group.innerHTML = '<div class="date-dot"></div>';

          const label = document.createElement('div');
          label.className = 'date-label';
          label.innerHTML = '<span>' + display + '</span><span class="weekday">' + wd + '</span><span class="count-badge">' + items.length + ' 篇</span>';
          group.appendChild(label);

          items.forEach(item => {
            var isError = item.error;
            const card = document.createElement('a');
            card.className = 'card' + (isError ? ' card-error' : '');
            card.href = isError ? (item.url || '#') : item.filename;
            card.target = isError ? '_blank' : '_blank';

            let tagsHtml = '';
            if (item.tags && item.tags.length > 0) {
              tagsHtml = '<div class="card-tags">' +
                item.tags.map((t, i) => '<span class="card-tag ' + TAG_COLORS[i % TAG_COLORS.length] + '">' + escapeHtml(t) + '</span>').join('') +
                '</div>';
            }

            var titleText = isError
              ? '⚠ ' + escapeHtml(item.title || '处理失败')
              : escapeHtml(item.title || item.filename.replace('.svg',''));

            var summaryText = isError
              ? escapeHtml(item.error_message || '未能成功生成总结')
              : escapeHtml(item.summary || '');

            var sourceLink = (item.url && !isError)
              ? '<a class="card-source-link" href="' + escapeHtml(item.url) + '" target="_blank">📎 原文链接</a>'
              : '';

            card.innerHTML =
              '<div class="card-header">' +
                '<span class="card-title">' + titleText + '</span>' +
                '<span class="card-time">' + escapeHtml(item.time || '') + '</span>' +
              '</div>' +
              '<div class="card-summary">' + summaryText + '</div>' +
              tagsHtml +
              sourceLink +
              '<span class="card-link-icon">&#x2197;</span>';

            group.appendChild(card);
          });

          tl.appendChild(group);
        });
      }

      function buildCalendar() {
        const now = new Date();
        if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }

        const year = calYear, month = calMonth;
        $('calTitle').textContent = year + '年' + (month + 1) + '月';

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevMonthDays = new Date(year, month, 0).getDate();

        const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

        const grid = $('calGrid');
        grid.innerHTML = '';

        for (let i = firstDay - 1; i >= 0; i--) {
          const d = prevMonthDays - i;
          const cell = document.createElement('div');
          cell.className = 'cal-day other-month';
          cell.textContent = d;
          grid.appendChild(cell);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateKey = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
          const cell = document.createElement('div');
          cell.className = 'cal-day';
          cell.textContent = d;

          if (dateMap[dateKey]) {
            cell.classList.add('has-data');
            cell.title = dateMap[dateKey].length + ' 篇总结';
            cell.addEventListener('click', function() { scrollToDate(dateKey); });
          }
          if (dateKey === today) {
            cell.classList.add('today');
          }

          grid.appendChild(cell);
        }

        const remaining = 42 - firstDay - daysInMonth;
        for (let d = 1; d <= remaining; d++) {
          const cell = document.createElement('div');
          cell.className = 'cal-day other-month';
          cell.textContent = d;
          grid.appendChild(cell);
        }
      }

      function scrollToDate(dateKey) {
        const tl = $('timeline');
        const groups = tl.querySelectorAll('.date-group');
        for (var i = 0; i < groups.length; i++) {
          var g = groups[i];
          var label = g.querySelector('.date-label');
          if (!label) continue;
          var text = label.textContent || '';
          // dateKey like "2026-06-21", substring(5) = "06-21"
          if (text.indexOf(dateKey.substring(5)) !== -1) {
            g.scrollIntoView({ behavior: 'smooth', block: 'start' });
            g.style.transition = 'background 0.3s';
            g.style.background = 'rgba(96,165,250,0.08)';
            g.style.borderRadius = '12px';
            g.style.padding = '12px';
            setTimeout(function() { g.style.background = 'transparent'; }, 1200);
            break;
          }
        }
      }

      function countValid(items) {
        var c = 0;
        items.forEach(function(item) { if (!item.error) c++; });
        return c;
      }
      function updateStats(count, days) {
        var errorCount = allData.filter(function(item) { return item.error; }).length;
        var validCount = count - errorCount;
        $('totalCount').textContent = validCount;
        $('totalDays').textContent = days;
        if (errorCount > 0) {
          $('totalCount').textContent = validCount + ' (+' + errorCount + ' 失败)';
        }
      }

      $('calPrev').addEventListener('click', function() {
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        buildCalendar();
      });
      $('calNext').addEventListener('click', function() {
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        buildCalendar();
      });
      $('calToday').addEventListener('click', function() {
        var now = new Date();
        calYear = now.getFullYear();

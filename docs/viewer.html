<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG 总结 · 语音讲解</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b1120;
      --surface: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent: #60a5fa;
      --accent2: #a78bfa;
    }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 17, 32, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    .toolbar-inner {
      max-width: 1400px;
      margin: 0 auto;
    }
    .toolbar-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      margin-bottom: 12px;
    }
    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: var(--accent); }
    .doc-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .audio-section {
      background: linear-gradient(135deg, rgba(163,113,247,0.1), rgba(96,165,250,0.08));
      border: 1px solid rgba(163,113,247,0.25);
      border-radius: 14px;
      padding: 16px 18px;
    }
    .audio-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .audio-player {
      width: 100%;
      height: 44px;
      border-radius: 10px;
    }
    .playback-speed {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .speed-label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .speed-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }
    .speed-btn:hover, .speed-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(96,165,250,0.12);
    }
    .audio-missing {
      font-size: 13px;
      color: #fbbf24;
      padding: 12px 0 0;
    }
    .svg-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    .svg-wrap object {
      display: block;
      width: 100%;
      max-width: 1320px;
      margin: 0 auto;
      border: none;
      border-radius: 12px;
      background: #f8fafc;
    }
    .error-box {
      max-width: 560px;
      margin: 80px auto;
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
    }
    .error-box a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar" style="display:none;">
    <div class="toolbar-inner">
      <div class="toolbar-top">
        <a class="back-link" href="index.html">← 返回首页</a>
        <div class="doc-title" id="docTitle">加载中…</div>
      </div>
      <div class="audio-section" id="audioSection">
        <p class="audio-hint">🎧 通勤时可听，跟着讲解走一遍（edge-tts 自然语音，与 daily-algo 同款）</p>
        <div id="audioMount"></div>
      </div>
    </div>
  </div>

  <div class="svg-wrap" id="svgWrap"></div>
  <div class="error-box" id="errorBox" style="display:none;"></div>

  <script>
  (function() {
    var params = new URLSearchParams(location.search);
    var file = params.get('f') || params.get('file');
    if (!file || file.indexOf('..') !== -1 || !/\.svg$/i.test(file)) {
      showError('缺少有效的 SVG 文件参数，请从<a href="index.html">首页</a>进入。');
      return;
    }

    function normalizedAudioUrl(svgFile) {
      return 'audio/' + svgFile.replace(/-总结\.svg$/i, '.mp3');
    }

    function setSpeed(rate) {
      var audio = document.getElementById('summary-audio');
      if (!audio) return;
      audio.playbackRate = rate;
      document.querySelectorAll('.speed-btn').forEach(function(btn) {
        btn.classList.toggle('active', parseFloat(btn.getAttribute('data-rate')) === rate);
      });
    }
    window.setSpeed = setSpeed;

    function mountAudioPlayer(src) {
      document.getElementById('audioMount').innerHTML =
        '<audio controls preload="metadata" class="audio-player" id="summary-audio">' +
          '<source src="' + escapeAttr(src) + '" type="audio/mpeg">' +
          '您的浏览器不支持音频播放' +
        '</audio>' +
        '<div class="playback-speed">' +
          '<span class="speed-label">速度</span>' +
          '<button type="button" class="speed-btn" data-rate="0.75" onclick="setSpeed(0.75)">0.75x</button>' +
          '<button type="button" class="speed-btn active" data-rate="1" onclick="setSpeed(1)">1x</button>' +
          '<button type="button" class="speed-btn" data-rate="1.25" onclick="setSpeed(1.25)">1.25x</button>' +
          '<button type="button" class="speed-btn" data-rate="1.5" onclick="setSpeed(1.5)">1.5x</button>' +
        '</div>';
    }

    function showMissingAudio() {
      document.getElementById('audioMount').innerHTML =
        '<p class="audio-missing">语音文件尚未生成。运行：<code>python3 scripts/generate_svg_audio.py ' +
        escapeHtml(file) + '</code></p>';
    }

    function showError(msg) {
      document.getElementById('errorBox').innerHTML = msg;
      document.getElementById('errorBox').style.display = '';
    }

    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }

    var audioSrc = normalizedAudioUrl(file);

    fetch(file)
      .then(function(res) {
        if (!res.ok) throw new Error('无法加载 ' + file);
        return res.text();
      })
      .then(function(svgText) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(svgText, 'image/svg+xml');
        var h1 = doc.querySelector('h1');
        var title = h1 ? h1.textContent.trim() : file.replace(/\.svg$/i, '');
        document.getElementById('docTitle').textContent = title;
        document.title = title + ' · 语音讲解';

        var obj = document.createElement('object');
        obj.type = 'image/svg+xml';
        obj.data = file;
        document.getElementById('svgWrap').appendChild(obj);
        document.getElementById('toolbar').style.display = '';

        return fetch(audioSrc, { method: 'HEAD' });
      })
      .then(function(res) {
        if (res && res.ok) {
          mountAudioPlayer(audioSrc);
        } else {
          showMissingAudio();
        }
      })
      .catch(function(err) {
        if (document.getElementById('toolbar').style.display !== 'none') {
          showMissingAudio();
        } else {
          showError('加载失败：' + escapeHtml(err.message) + '。<a href="index.html">返回首页</a>');
        }
      });
  })();
  </script>
</body>
</html>
